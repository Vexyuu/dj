# Identifiants du projet
sonar.projectKey=Vexyuu_dj
sonar.projectName=dj
sonar.organization=vexyuu

# Host (SonarCloud par défaut)
sonar.host.url=https://sonarcloud.io

# Chemins des sources
sonar.sources=src
sonar.exclusions=var/**, vendor/**, public/bundles/**, tests/**

# Chemins des tests
sonar.tests=tests
sonar.test.inclusions=tests/**/*.php

# Encodage et Langue
sonar.sourceEncoding=UTF-8
sonar.language=php

# Couverture de code
sonar.php.coverage.reportPaths=coverage.xml