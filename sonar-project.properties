# Identifiants du projet
sonar.projectKey=nom-de-votre-projet-symfony
sonar.projectName=Mon Application Symfony

# Chemins des sources
sonar.sources=src
# On exclut les dossiers de cache, de logs et les dépendances
sonar.exclusions=var/**, vendor/**, public/bundles/**, tests/**

# Chemins des tests (pour l'analyse de la qualité des tests)
sonar.tests=tests
sonar.test.inclusions=tests/**/*.php

# Encodage et Langue
sonar.sourceEncoding=UTF-8
sonar.language=php

sonar.php.coverage.reportPaths=coverage.xml
    # Optionnel : si vous utilisez PHPStan ou Psalm, vous pouvez aussi importer leurs rapports
    # sonar.php.phpstan.reportPaths=phpstan-report.json
    ```

---

### 3. Automatisation (Pipeline CI/CD)
Comme Symfony s'appuie souvent sur Composer, voici comment structurer votre connexion dans un pipeline (exemple GitHub Actions) :

```yaml
jobs:
  sonarqube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Important pour que Sonar puisse comparer les versions

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run Tests with Coverage
        run: XDEBUG_MODE=coverage php bin/phpunit --coverage-clover=coverage.xml

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}